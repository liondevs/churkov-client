<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escape from Churkov</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      width: 480px;
      height: 300px;
      background: linear-gradient(145deg, #0d0d1a 0%, #0a0a14 60%, #12091f 100%);
      border: 1px solid rgba(30, 255, 105, 0.25);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Animated background glow */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 80, 20, 0.12) 0%, transparent 70%);
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }

    .logo-icon {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(30, 255, 79, 0.6));
      animation: float 2.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #A7C957, #386641, #A7C957);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-area {
      width: 100%;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 1;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #A7C957, #386641);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(30, 255, 105, 0.6);
    }

    .status-text {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
      text-align: center;
    }

    .speed-text {
      font-size: 11px;
      color: rgba(30, 255, 105, 0.7);
      letter-spacing: 0.5px;
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 20px;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 1px;
    }

    /* Spinner for checking state */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,110,30,0.2);
      border-top-color: #A7C957;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Indeterminate bar for checking */
    .indeterminate .progress-bar-fill {
      width: 30% !important;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>

    <div class="logo-area">
      <div class="logo-icon"><img src= "splashlogo.png" width="128" height="128"></div>
      <div class="logo-text">Escape from Churkov</div>
      <div class="tagline">Extraction Shooter</div>
    </div>

    <div class="status-area">
      <div class="progress-bar-bg" id="progressBg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="status-row">
        <div class="spinner" id="spinner"></div>
        <div class="status-text" id="statusText">Initializing...</div>
      </div>
      <div class="speed-text" id="speedText"></div>
    </div>

    <div class="version" id="version"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const progressBg = document.getElementById('progressBg');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const speedText = document.getElementById('speedText');
    const spinner = document.getElementById('spinner');
    const versionEl = document.getElementById('version');

    // Show version
    versionEl.textContent = 'v' + ipcRenderer.sendSync('app-version');

    ipcRenderer.on('update-status', (event, data) => {
      statusText.textContent = data.message;

      switch(data.status) {
        case 'checking':
          progressBg.classList.add('indeterminate');
          spinner.style.display = 'block';
          progressFill.style.width = '0%';
          break;
        case 'downloading':
          progressBg.classList.remove('indeterminate');
          spinner.style.display = 'none';
          progressFill.style.width = '5%';
          break;
        case 'ready':
        case 'installing':
          progressBg.classList.remove('indeterminate');
          spinner.style.display = 'none';
          progressFill.style.width = '100%';
          speedText.textContent = '';
          break;
        case 'error':
          progressBg.classList.remove('indeterminate');
          spinner.style.display = 'none';
          progressFill.style.width = '0%';
          statusText.style.color = 'rgba(255,80,80,0.7)';
          break;
      }
    });

    ipcRenderer.on('update-progress', (event, data) => {
      progressFill.style.width = data.percent + '%';
      speedText.textContent = `${data.transferred} / ${data.total}  •  ${data.speed}`;
    });
  </script>
</body>
</html>
