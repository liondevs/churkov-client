<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Connection Error - Escape from Churkov</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a14;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    .icon { font-size: 64px; }
    h1 { font-size: 24px; color: #ff6e1e; }
    p { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; max-width: 400px; line-height: 1.6; }
    button {
      background: linear-gradient(135deg, #ff6e1e, #ff9a50);
      border: none;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h1>Cannot Connect to Server</h1>
  <p>Escape from Churkov could not connect to the game server. Please check your internet connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
